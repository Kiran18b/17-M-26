<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title> HAPPY BIRTHDAY ANUSHA </title>
  <link rel="stylesheet" href="style.css?v=13">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="canvas" style="display:none;"></canvas>

  <!-- Birthday Card Overlay -->
  <div id="birthdayCard" style="display:block;">
    <div class="card-background">
      <!-- Bokeh decoration -->
      <div class="bokeh"></div>
      <div class="bokeh"></div>
      <div class="bokeh"></div>

      <!-- Glowing orbs -->
      <div class="orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
      </div>

      <!-- Twinkling stars inside glass -->
      <div class="twinkle-stars">
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
        <span class="twinkle"></span>
      </div>


      <!-- Main Text -->
      <div class="card-content">
        <h1 class="greeting">
          <span class="line line-2 birthday-text">BIRTHDAY</span>
        </h1>

        <p class="message">
          <span class="line line-4">Before this beautiful day ends,</span><br>
          <span class="line line-5">I just want to wish you Happy Birthday</span><br>
          <span class="line line-6">once again.</span>
        </p>

        <p class="message-2">
          <span class="line line-7">You are very special to me,</span><br>
          <span class="line line-8">and I'm truly grateful to have you in my life.</span><br>
          <span class="line line-9">I will always be there for you,</span><br>
          <span class="line line-10">no matter what.</span>
        </p>

        <p class="final-message">
          <span class="line line-11">Wishing you a life full of</span><br>
          <span class="line line-12">love, happiness, and success. ✨</span>
        </p>
      </div>

    </div>
  </div>

  <img id="bear" src="https://i.pinimg.com/originals/e5/c5/4c/e5c54cd43fd75a7ec5b7cf0f65838ec3.gif" alt="Bear" style="display:none;" />

  <script src="script.js?v=16"></script>
  
</body>
</html>
